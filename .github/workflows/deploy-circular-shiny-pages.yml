name: Deploy Circular Shiny App to GitHub Pages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-circular-shiny-pages.yml"
      - "02_scripts/deploy/shiny_circular_conflict/**"
      - "02_scripts/deploy/export_circular_shinylive.R"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up R package dependencies
        uses: rstudio/shiny-workflows/setup-r-package@v1
        with:
          packages: |
            renv
            posit-dev/r-shinylive
            sessioninfo

      - name: Find app package dependencies
        run: |
          deps <- unique(renv::dependencies("02_scripts/deploy/shiny_circular_conflict")$Package)
          deps <- deps[!is.na(deps) & nzchar(deps)]
          pak::pak(deps)
        shell: Rscript {0}

      - name: Export Shinylive site
        run: |
          shinylive::export("02_scripts/deploy/shiny_circular_conflict", "site")
        shell: Rscript {0}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
